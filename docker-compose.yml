services:
  whatsapp-db:
    image: mysql:8.0
    container_name: whatsapp_mysql_container
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=whatsapp_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - whatsapp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-kafka:
    image: apache/kafka:3.9.0
    container_name: whatsapp_kafka_container
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@whatsapp-kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://whatsapp-kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_OFFERED_CREDENTIALS_CHALLENGE_ALLOWED=true
      # FIXED: Overriding cluster production defaults to allow single-node offset tracking
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "9092:9092"
    networks:
      - whatsapp_network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-backend:
    build: ./backend
    container_name: whatsapp_backend_container
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=whatsapp-db
      - KAFKA_HOST=whatsapp-kafka
      - REDIS_HOST=whatsapp-redis
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - whatsapp_network
    depends_on:
      whatsapp-db:
        condition: service_healthy
      whatsapp-kafka:
        condition: service_healthy
      whatsapp-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  whatsapp-redis:
    image: redis:7.2-alpine
    container_name: whatsapp_redis_container
    ports:
      - "6379:6379"
    networks:
      - whatsapp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-frontend:
    build: ./frontend
    container_name: whatsapp_frontend_container
    ports:
      - "5173:5173"
    networks:
      - whatsapp_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      whatsapp-backend:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  whatsapp_network:
    driver: bridge