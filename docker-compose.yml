version: '3.8'

services:
  whatsapp-db:
    image: mysql:8.0
    container_name: whatsapp_mysql_container
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=whatsapp_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - whatsapp_network

  whatsapp-kafka:
    # FIXED: Migrated from legacy tag to official stable modern platform distribution distribution image
    image: bitnami/kafka:latest
    container_name: whatsapp_kafka_container
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://whatsapp-kafka:9092
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@whatsapp-kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    networks:
      - whatsapp_network

  whatsapp-backend:
    build: ./backend
    container_name: whatsapp_backend_container
    ports:
      - "8080:8080"
    networks:
      - whatsapp_network
    depends_on:
      - whatsapp-db
      - whatsapp-kafka

  whatsapp-frontend:
    build: ./frontend
    container_name: whatsapp_frontend_container
    ports:
      - "5173:5173"
    networks:
      - whatsapp_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - whatsapp-backend

volumes:
  mysql_data:

networks:
  whatsapp_network:
    driver: bridge