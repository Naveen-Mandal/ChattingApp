services:

  whatsapp-db:
    image: mysql:8.0
    container_name: whatsapp_mysql_container
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whatsapp_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - whatsapp_network

  whatsapp-kafka:
    image: apache/kafka:3.9.0
    container_name: whatsapp_kafka_container
    restart: unless-stopped

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@whatsapp-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://whatsapp-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

    ports:
      - "9092:9092"

    networks:
      - whatsapp_network

  whatsapp-backend:
    build: ./backend
    container_name: whatsapp_backend_container
    restart: unless-stopped

    environment:
      DB_HOST: whatsapp-db
      DB_PORT: 3306
      DB_NAME: whatsapp_db
      DB_USER: root
      DB_PASSWORD: root

      KAFKA_HOST: whatsapp-kafka

    ports:
      - "8080:8080"

    depends_on:
      - whatsapp-db
      - whatsapp-kafka

    networks:
      - whatsapp_network

  whatsapp-frontend:
    build: ./frontend
    container_name: whatsapp_frontend_container
    restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - whatsapp-backend

    networks:
      - whatsapp_network

volumes:
  mysql_data:

networks:
  whatsapp_network:
    driver: bridge