spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://${DB_HOST:whatsapp-db}:${DB_PORT:3306}/${DB_NAME:whatsapp_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  threads:
    virtual:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_HOST:whatsapp-kafka}:9092

  data:
    redis:
      host: ${REDIS_HOST:whatsapp-redis}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

app:
  jwt:
    secret: ${JWT_SECRET}