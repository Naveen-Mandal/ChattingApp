spring:
  application:
    name: backend

  #Standard Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:whatsapp_db}?createDatabaseIfNotExist=true
    username: ${DB_USER:naveen_developer}
    password: ${DB_PASSWORD:Naveen123#}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    #  Prevent Memory Leaks & Optimize Queries
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  #  Enable Java 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # FIXED: Updated value-serializer path
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      group-id: chat-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # FIXED: Updated value-deserializer path
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"